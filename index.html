<!DOCTYPE html>
<html>
<head>
  <title>Dental App Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Register</h2>
<input id="ruser" placeholder="username"><br>
<input id="rpass" type="password" placeholder="password"><br>
<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>
<input id="luser" placeholder="username"><br>
<input id="lpass" type="password" placeholder="password"><br>
<button onclick="login()">Login</button>

<hr>

<div id="status"></div>

<script>
const supabase = window.supabase.createClient(
  "https://bhtlwacoyjnyotsjtqrp.supabase.co",
  "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ"
);

// REGISTER
async function register() {
  const user = document.getElementById("ruser").value.trim();
  const pass = document.getElementById("rpass").value.trim();

  if (!user || !pass) {
    status("Isi semua field!");
    return;
  }

  const email = user + "@app.com";

  const { error } = await supabase.auth.signUp({
    email: email,
    password: pass
  });

  if (error) {
    status("❌ Register gagal: " + error.message);
  } else {
    status("✅ Register berhasil! Sekarang login.");
  }
}

// LOGIN
async function login() {
  const user = document.getElementById("luser").value.trim();
  const pass = document.getElementById("lpass").value.trim();

  if (!user || !pass) {
    status("Isi semua field!");
    return;
  }

  const email = user + "@app.com";

  const { error, data } = await supabase.auth.signInWithPassword({
    email: email,
    password: pass
  });

  if (error) {
    status("❌ Login gagal: " + error.message);
  } else {
    status("✅ Login BERHASIL!");
    console.log("User:", data);
  }
}

// helper
function status(msg) {
  document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
