<!DOCTYPE html>
<html>
<head>
  <title>Dental App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Login</h2>
<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h2>Register</h2>
<input id="regUsername" placeholder="Username">
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<hr>

<div id="app" style="display:none">
  <h2>Berhasil Login</h2>
  <button onclick="logout()">Logout</button>
</div>

<script>
const SUPABASE_URL = "https://bhtlwacoyjnyotsjtqrp.supabase.co";
const SUPABASE_KEY = "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// LOGIN
async function login() {
  const username = document.getElementById("loginUsername").value;
  const password = document.getElementById("loginPassword").value;

  const email = username + "@app.com";

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Login gagal: " + error.message);
  } else {
    document.getElementById("app").style.display = "block";
  }
}

// REGISTER
async function register() {
  const username = document.getElementById("regUsername").value;
  const password = document.getElementById("regPassword").value;

  const email = username + "@app.com";

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    alert("Register gagal: " + error.message);
  } else {
    alert("Register berhasil! Silakan login");
  }
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}
</script>

</body>
</html>
