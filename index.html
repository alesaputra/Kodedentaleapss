<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental App</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* LOGIN */
#login{
  background:white;
  color:black;
  padding:30px;
  border-radius:15px;
  width:280px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

button{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
}

#app{display:none;}
</style>
</head>

<body>

<div id="login">
  <h2>Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Masuk</button>
  <div id="error"></div>
</div>

<div id="app">
  <h2>✅ BERHASIL LOGIN</h2>
</div>

<script>

const users=[
{username:"dokter",password:"dokter24"},
{username:"admin",password:"klinik24"},
{username:"asisten",password:"babu24"}
];

function login(){
  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();

  const found = users.find(x => x.username === u && x.password === p);

  if(found){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    document.getElementById("error").innerText="Login gagal";
  }
}

</script>

</body>
</html>
