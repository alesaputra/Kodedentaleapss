<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-blue-500 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-80">

  <h2 class="text-xl font-bold mb-4 text-center">Login</h2>

  <input id="user" placeholder="Username"
    class="w-full border p-2 mb-3 rounded">

  <input id="pass" type="password" placeholder="Password"
    class="w-full border p-2 mb-3 rounded">

  <button onclick="login()"
    class="w-full bg-blue-600 text-white p-2 rounded">
    Login
  </button>

  <p id="status" class="text-center text-red-500 mt-3 text-sm"></p>

</div>

<script>
const client = window.supabase.createClient(
  "https://bhtlwacoyjnyotsjtqrp.supabase.co",
  "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ"
);

async function login() {
  const email = document.getElementById("user").value + "@app.com";
  const pass = document.getElementById("pass").value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password: pass
  });

  if (error) {
    document.getElementById("status").innerText = error.message;
  } else {
    // 👉 PINDAH KE DASHBOARD
    window.location.href = "dashboard.html";
  }
}
</script>

</body>
</html>
