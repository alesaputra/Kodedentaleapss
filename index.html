<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial;
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  display:flex;align-items:center;justify-content:center;
  color:white;
}

.glass{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  width:350px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  background:#38bdf8;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{background:#0ea5e9}

.hidden{display:none}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="glass">
  <h2>Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appBox" class="glass hidden">
  <h2>Dental App</h2>

  <label>Kategori</label>
  <select id="kategori" onchange="loadObat()">
    <option value="analgesik">Analgesik</option>
    <option value="antibiotik">Antibiotik</option>
  </select>

  <label>Obat</label>
  <select id="obat"></select>

  <label>Berat Badan (kg)</label>
  <input id="bb" type="number">

  <label>Mode</label>
  <select id="mode">
    <option value="dewasa">Dewasa</option>
    <option value="anak">Anak</option>
  </select>

  <button onclick="hitung()">Hitung</button>

  <pre id="hasil"></pre>

  <button onclick="logout()">Logout</button>
</div>

<script>
// ================= CONFIG =================
const SUPABASE_URL = "https://bhtlwacoyjnyotsjtqrp.supabase.co";
const SUPABASE_KEY = "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

// ================= LOGIN =================
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u==="admin" && p==="123"){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");
    loadObat();
  } else {
    alert("Login salah");
  }
}

function logout(){
  location.reload();
}

// ================= LOAD OBAT =================
async function loadObat(){
  let kategori = document.getElementById("kategori").value;
  let select = document.getElementById("obat");

  select.innerHTML = "<option>Loading...</option>";

  let { data, error } = await supabase
    .from("obat")
    .select("*")
    .eq("kategori", kategori);

  if(error){
    alert("Gagal ambil data");
    console.log(error);
    return;
  }

  select.innerHTML = "";

  data.forEach(o=>{
    let opt = document.createElement("option");
    opt.value = JSON.stringify(o);
    opt.text = o.nama;
    select.add(opt);
  });
}

// ================= HITUNG =================
function hitung(){
  let bb = document.getElementById("bb").value;
  let mode = document.getElementById("mode").value;
  let obat = JSON.parse(document.getElementById("obat").value);

  let dosis = mode==="dewasa" ? obat.dosis_dewasa : obat.dosis_anak;

  let hasil = `
R/ ${obat.nama}
S: ${dosis}

Indikasi: ${obat.indikasi}
Kontraindikasi: ${obat.kontraindikasi}
Merk: ${obat.merk}
KIE: ${obat.kie}
`;

  document.getElementById("hasil").innerText = hasil;
}
</script>

</body>
</html>
