<!DOCTYPE html>
<html>
<head>
  <title>Dental App</title>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      margin:0;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding:30px;
      border-radius:15px;
      backdrop-filter: blur(10px);
      width:300px;
      color:white;
    }

    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:8px;
    }

    button {
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#00c6ff;
      color:white;
      cursor:pointer;
    }

    .hidden {
      display:none;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h2>Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="card hidden" id="appBox">
  <h2>Data Obat</h2>
  <div id="dataObat"></div>
  <button onclick="logout()">Logout</button>
</div>

<script>
/* ================= CONFIG ================= */

// 👉 GANTI DENGAN PUNYA KAMU
const SUPABASE_URL = "https://bhtlwacoyjnyotsjtqrp.supabase.co";
const SUPABASE_KEY = "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ";

// init (HANYA SEKALI!)
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


/* ================= LOGIN ================= */

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === "admin" && p === "123"){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");
    loadData();
  } else {
    alert("Login salah");
  }
}


/* ================= LOAD DATA ================= */

async function loadData(){
  const { data, error } = await supabaseClient
    .from("obat")
    .select("*");

  if(error){
    console.log(error);
    alert("Gagal ambil data");
    return;
  }

  let html = "";
  data.forEach(o=>{
    html += `<p><b>${o.nama}</b> - ${o.dosis_dewasa}</p>`;
  });

  document.getElementById("dataObat").innerHTML = html;
}


/* ================= LOGOUT ================= */

function logout(){
  location.reload();
}
</script>

</body>
</html>
