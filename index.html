<!DOCTYPE html>
<html>
<head>
  <title>Dental App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h2>Register</h2>
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<div id="data"></div>

<script>
const SUPABASE_URL = "https://bhtlwacoyjnyotsjtqrp.supabase.co";
const SUPABASE_KEY = "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// REGISTER
async function register(){
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;

  const { error } = await supabase.auth.signUp({ email, password });

  if(error){
    alert(error.message);
  } else {
    alert("Register berhasil!");
  }
}

// LOGIN
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    alert(error.message);
  } else {
    loadData();
  }
}

// LOAD DATA
async function loadData(){
  const { data } = await supabase.from("obat").select("*");

  let html = "";
  data.forEach(o => {
    html += `<p>${o.nama} - ${o.dosis_dewasa}</p>`;
  });

  document.getElementById("data").innerHTML = html;
}
</script>

</body>
</html>
