<!DOCTYPE html>
<html>
<head>
  <title>Test Supabase Auth</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Register</h2>
<input id="ruser" placeholder="username"><br>
<input id="rpass" type="password" placeholder="password"><br>
<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>
<input id="luser" placeholder="username"><br>
<input id="lpass" type="password" placeholder="password"><br>
<button onclick="login()">Login</button>

<hr>

<div id="status"></div>

<script>
const supabase = window.supabase.createClient(
  "https://bhtlwacoyjnyotsjtqrp.supabase.co",
  "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ"
);

// REGISTER
async function register() {
  const user = document.getElementById("ruser").value;
  const pass = document.getElementById("rpass").value;

  const email = user + "@app.com";

  const { error } = await supabase.auth.signUp({
    email: email,
    password: pass
  });

  if (error) {
    document.getElementById("status").innerText = "Register gagal: " + error.message;
  } else {
    document.getElementById("status").innerText = "Register berhasil!";
  }
}

// LOGIN
async function login() {
  const user = document.getElementById("luser").value;
  const pass = document.getElementById("lpass").value;

  const email = user + "@app.com";

  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: pass
  });

  if (error) {
    document.getElementById("status").innerText = "Login gagal: " + error.message;
  } else {
    document.getElementById("status").innerText = "Login BERHASIL!";
  }
}
</script>

</body>
</html>
