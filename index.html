<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',Arial;
  min-height:100vh;
  background: radial-gradient(circle at 20% 30%, #38bdf8 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, #6366f1 0%, transparent 40%),
              linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
}

/* LOGIN */
#login{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}
.login-card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
}
.login-input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#eef6f9;
}
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* SUCCESS */
#success{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.check{
  width:100px;height:100px;
  border-radius:50%;
  background:#22c55e;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
}

/* APP */
.container{display:none;padding:20px;max-width:520px;margin:auto;}
.header{display:flex;justify-content:space-between;margin-bottom:15px}
.avatar{
  width:40px;height:40px;border-radius:50%;
  background:#22c55e;display:flex;align-items:center;justify-content:center;
}

.form-box{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  padding:20px;border-radius:15px;
}

select,input:not(.login-input){
  width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;
}

.btn-primary{
  width:100%;padding:12px;margin-top:10px;
  border:none;border-radius:10px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;font-weight:bold;cursor:pointer;
}

.quick{display:flex;gap:10px;margin-top:10px}
.quick button{flex:1;padding:10px;border:none;border-radius:10px;background:#334155;color:white}

.card{background:white;color:black;padding:15px;border-radius:10px;margin-top:10px}

footer{
  position:fixed;bottom:0;width:100%;
  text-align:center;font-size:12px;padding:10px;
  background:rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="login">
  <div class="login-card">
    <h2>🦷 Dental App</h2>
    <input id="user" class="login-input" placeholder="Username">
    <input id="pass" type="password" class="login-input" placeholder="Password">
    <button class="btn" onclick="login()">Masuk</button>
    <div id="error" style="color:red;"></div>
  </div>
</div>

<div id="success">
  <div class="check">✔</div>
</div>

<div class="container" id="app">
<div class="header">
  <div>
    <h3 id="greet">Halo Dokter 👋</h3>
    <small id="date"></small>
  </div>
  <div class="avatar" id="avatar">D</div>
</div>

<div class="form-box">

<select id="mode" onchange="toggleBB()">
<option value="dewasa">Dewasa</option>
<option value="anak">Anak</option>
</select>

<input id="bb" class="hidden" placeholder="BB (kg)">

<select id="kategori" onchange="loadObat()">
<option value="analgesik">Analgesik</option>
<option value="antibiotik">Antibiotik</option>
<option value="lain">Lain</option>
</select>

<select id="obat"></select>

<button class="btn-primary" onclick="run()">PROSES</button>

<div class="quick">
<button onclick="copyResep()">📋 Salin</button>
<button onclick="resetForm()">🔄 Reset</button>
</div>

</div>

<div id="out"></div>
</div>

<footer>© 2026 Dental App • DENTALE SPT</footer>

<script>

/* USER */
const users=[
{username:"dokter",password:"dokter24",name:"Dokter"},
{username:"admin",password:"klinik24",name:"Admin"},
{username:"asisten",password:"babu24",name:"Asisten"}
];

/* LOGIN */
function login(){
  let u=document.getElementById("user").value.trim();
  let p=document.getElementById("pass").value.trim();

  let found=users.find(x=>x.username===u && x.password===p);

  if(found){
    document.getElementById("success").style.display="flex";

    setTimeout(()=>{
      document.getElementById("success").style.display="none";
      document.getElementById("login").style.display="none";
      document.getElementById("app").style.display="block";

      document.getElementById("greet").innerText="Halo "+found.name+" 👋";
      document.getElementById("avatar").innerText=found.name.charAt(0);

      setDate();
      loadObat();
    },800);

  }else{
    document.getElementById("error").innerText="Username / Password salah";
  }
}

/* DATE */
function setDate(){
  document.getElementById("date").innerText=new Date().toLocaleDateString("id-ID");
}

/* DATA OBAT */
const data={
analgesik:["Paracetamol","Ibuprofen","Mefenamic Acid","Diclofenac","Ketorolac","Tramadol"],
antibiotik:["Amoxicillin","Amoxiclav","Cefadroxil","Cefixime","Clindamycin","Metronidazole","Azithromycin"],
lain:["Omeprazole","Metylprednisolone","Dexamethasone"]
};

function loadObat(){
  let k=document.getElementById("kategori").value;
  let select=document.getElementById("obat");
  select.innerHTML="";
  data[k].forEach(o=>{
    let opt=document.createElement("option");
    opt.text=o;
    select.add(opt);
  });
}

let currentResep="";

/* RUN */
function run(){
  let obat=document.getElementById("obat").value;
  let resep="R/ "+obat+"\nS: sesuai aturan pakai";
  currentResep=resep;

  document.getElementById("out").innerHTML=
  `<div class="card"><pre>${resep}</pre></div>`;
}

/* UTIL */
function copyResep(){
  if(!currentResep)return alert("Belum ada resep");
  navigator.clipboard.writeText(currentResep);
  alert("Tersalin");
}

function resetForm(){
  document.getElementById("out").innerHTML="";
  currentResep="";
}

function toggleBB(){
  let bb=document.getElementById("bb");
  document.getElementById("mode").value==="anak"?bb.classList.remove("hidden"):bb.classList.add("hidden");
}

</script>

</body>
</html>
