<!DOCTYPE html>
<html>
<head>
  <title>Dental App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #00c6ff;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0096c7;
    }

    .hidden {
      display: none;
    }

    .obat-item {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appBox" class="card hidden">
  <h2>Data Obat</h2>
  <div id="listObat"></div>
  <button onclick="logout()">Logout</button>
</div>

<script>
// ================= CONFIG =================
const SUPABASE_URL = "https://bhtlwacoyjnyotsjtqrp.supabase.co";
const SUPABASE_KEY = "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

// ================= LOGIN =================
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "admin" && p === "123"){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");
    loadData();
  } else {
    alert("Login salah!");
  }
}

// ================= LOGOUT =================
function logout(){
  location.reload();
}

// ================= LOAD DATA =================
async function loadData(){
  const { data, error } = await supabase
    .from("obat")
    .select("*");

  if(error){
    alert("Error ambil data");
    console.log(error);
    return;
  }

  let html = "";

  data.forEach(o => {
    html += `
      <div class="obat-item">
        <b>${o.nama}</b><br>
        Kategori: ${o.kategori}<br>
        Dosis Dewasa: ${o.dosis_dewasa}<br>
        Dosis Anak: ${o.dosis_anak}<br>
        Indikasi: ${o.indikasi}<br>
        Kontra: ${o.kontraindikasi}<br>
        Merk: ${o.merk}<br>
        Keterangan: ${o.kie}
      </div>
    `;
  });

  document.getElementById("listObat").innerHTML = html;
}
</script>

</body>
</html>
