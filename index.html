<!DOCTYPE html>
<html>
<head>
  <title>Dental App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h2>Login (Username)</h2>
<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h2>Register</h2>
<input id="regUsername" placeholder="Username">
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<div id="data"></div>

<script>
const SUPABASE_URL = "https://bhtlwacoyjnyotsjtqrp.supabase.co";
const SUPABASE_KEY = "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// REGISTER
async function register(){
  const username = document.getElementById("regUsername").value;
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;

  // 1. register ke auth
  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  // 2. simpan username
  const userId = data.user.id;

  await supabase.from("users").insert({
    id: userId,
    username: username
  });

  alert("Register berhasil!");
}

// LOGIN USERNAME
async function login(){
  const username = document.getElementById("loginUsername").value;
  const password = document.getElementById("loginPassword").value;

  // 1. cari email dari username
  const { data: userData, error } = await supabase
    .from("users")
    .select("*")
    .eq("username", username)
    .single();

  if(error || !userData){
    alert("Username tidak ditemukan");
    return;
  }

  // 2. login pakai email
  const { error: loginError } = await supabase.auth.signInWithPassword({
    email: userData.email,
    password: password
  });

  if(loginError){
    alert("Password salah");
    return;
  }

  loadData();
}

// LOAD DATA
async function loadData(){
  const { data } = await supabase.from("obat").select("*");

  let html = "";
  data.forEach(o => {
    html += `<p>${o.nama} - ${o.dosis_dewasa}</p>`;
  });

  document.getElementById("data").innerHTML = html;
}
</script>

</body>
</html>
