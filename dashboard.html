<!DOCTYPE html>
<html>
<head>
  <title>Dental Dashboard</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">

<div class="flex">

  <!-- SIDEBAR -->
  <div class="w-64 bg-blue-700 text-white min-h-screen p-4">
    <h1 class="text-xl font-bold mb-6">Dental App</h1>

    <div class="space-y-2">
      <button onclick="showMenu('dashboard')" class="block">Dashboard</button>
      <button onclick="showMenu('patients')" class="block">Pasien</button>
      <button onclick="showMenu('resep')" class="block">Resep Obat</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 p-6">

    <!-- DASHBOARD -->
    <div id="dashboard">
      <h1 class="text-2xl font-bold">Selamat Datang</h1>
    </div>

    <!-- PASIEN -->
    <div id="patients" class="hidden">
      <h1 class="text-xl font-bold mb-4">Data Pasien</h1>

      <div class="bg-white p-4 rounded shadow mb-4">
        <input id="no_rm" placeholder="No Rekam Medis" class="border p-2 w-full mb-2">
        <input id="nama" placeholder="Nama" class="border p-2 w-full mb-2">
        <input id="umur" placeholder="Umur" class="border p-2 w-full mb-2">
        <input id="alamat" placeholder="Alamat" class="border p-2 w-full mb-2">
        <input id="no_hp" placeholder="No HP" class="border p-2 w-full mb-2">

        <button onclick="simpanPasien()" class="bg-blue-600 text-white p-2 w-full rounded">
          Simpan Pasien
        </button>
      </div>

      <div id="listPasien" class="bg-white p-4 rounded shadow"></div>
    </div>

    <!-- RESEP -->
    <div id="resep" class="hidden">
      <h1 class="text-xl font-bold mb-4">Resep Obat</h1>

      <div class="bg-white p-4 rounded shadow mb-4">
        <select id="patient_id" class="border p-2 w-full mb-2"></select>

        <input id="obat" placeholder="Nama Obat" class="border p-2 w-full mb-2">
        <input id="dosis" placeholder="Dosis" class="border p-2 w-full mb-2">

        <button onclick="simpanResep()" class="bg-blue-600 text-white p-2 w-full rounded">
          Simpan Resep
        </button>
      </div>

      <div id="listResep" class="bg-white p-4 rounded shadow"></div>
    </div>

  </div>
</div>

<script>
const client = window.supabase.createClient(
  "https://bthlwacoyjnyotsjtqrp.supabase.co",
  "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ"
)


// NAVIGATION
function showMenu(menu) {
  document.getElementById('dashboard').classList.add('hidden')
  document.getElementById('patients').classList.add('hidden')
  document.getElementById('resep').classList.add('hidden')

  document.getElementById(menu).classList.remove('hidden')

  if(menu === 'patients') loadPasien()
  if(menu === 'resep') {
    loadPasienDropdown()
    loadResep()
  }
}


// ================= PASIEN =================
async function simpanPasien() {
  try {
    const { error } = await client.from("patients").insert([{
      no_rm: document.getElementById('no_rm').value,
      nama: document.getElementById('nama').value,
      umur: parseInt(document.getElementById('umur').value),
      alamat: document.getElementById('alamat').value,
      no_hp: document.getElementById('no_hp').value
    }])

    if(error) {
      alert(error.message)
      console.log(error)
    } else {
      alert("Berhasil simpan pasien")
      loadPasien()
    }

  } catch (err) {
    alert("ERROR FETCH: " + err.message)
    console.log(err)
  }
}

async function loadPasien() {
  const { data, error } = await client.from("patients").select("*")

  if(error) return console.log(error)

  let html = ""
  data.forEach(p => {
    html += `<div class="border-b py-2">
      <b>${p.nama}</b> - ${p.no_rm}
    </div>`
  })

  document.getElementById('listPasien').innerHTML = html
}


// ================= DROPDOWN =================
async function loadPasienDropdown() {
  const { data } = await client.from("patients").select("*")

  let html = `<option value="">Pilih Pasien</option>`
  data.forEach(p => {
    html += `<option value="${p.id}">${p.nama}</option>`
  })

  document.getElementById('patient_id').innerHTML = html
}


// ================= RESEP =================
async function simpanResep() {
  try {
    const { error } = await client.from("resep").insert([{
      patient_id: document.getElementById('patient_id').value,
      obat: document.getElementById('obat').value,
      dosis: document.getElementById('dosis').value
    }])

    if(error) {
      alert(error.message)
      console.log(error)
    } else {
      alert("Resep tersimpan")
      loadResep()
    }

  } catch (err) {
    alert("FETCH ERROR: " + err.message)
    console.log(err)
  }
}

async function loadResep() {
  const { data, error } = await client
    .from("resep")
    .select("*, patients(nama)")

  if(error) return console.log(error)

  let html = ""
  data.forEach(r => {
    html += `<div class="border-b py-2">
      <b>${r.patients?.nama || '-'}</b><br>
      ${r.obat} - ${r.dosis}
    </div>`
  })

  document.getElementById('listResep').innerHTML = html
}

</script>

</body>
</html>
