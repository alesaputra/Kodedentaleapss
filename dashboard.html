<!DOCTYPE html>
<html>
<head>
  <title>Dental Dashboard</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-blue-700 text-white p-5">
    <h2 class="text-xl font-bold mb-6">Dental App</h2>

    <ul class="space-y-3">
      <li onclick="show('dashboard')" class="cursor-pointer hover:underline">Dashboard</li>
      <li onclick="show('patients')" class="cursor-pointer hover:underline">Pasien</li>
      <li onclick="show('resep')" class="cursor-pointer hover:underline">Resep Obat</li>
      <li onclick="logout()" class="cursor-pointer text-red-300 mt-10">Logout</li>
    </ul>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 p-6 overflow-auto">

    <!-- DASHBOARD -->
    <div id="dashboard">
      <h1 class="text-2xl font-bold mb-4">Dashboard</h1>
      <p>Selamat datang di sistem klinik gigi 🦷</p>
    </div>

    <!-- PASIEN -->
    <div id="patients" class="hidden">
      <h1 class="text-2xl font-bold mb-4">Data Pasien</h1>

      <div class="bg-white p-4 rounded shadow mb-4">
        <input id="no_rm" placeholder="No Rekam Medis" class="border p-2 w-full mb-2">
        <input id="nama" placeholder="Nama" class="border p-2 w-full mb-2">
        <input id="umur" placeholder="Umur" class="border p-2 w-full mb-2">
        <input id="alamat" placeholder="Alamat" class="border p-2 w-full mb-2">
        <input id="no_hp" placeholder="No HP" class="border p-2 w-full mb-2">

        <button onclick="tambahPasien()" class="bg-blue-600 text-white p-2 w-full rounded">
          Simpan Pasien
        </button>
      </div>

      <div id="listPasien" class="bg-white p-4 rounded shadow"></div>
    </div>

    <!-- RESEP -->
    <div id="resep" class="hidden">
      <h1 class="text-2xl font-bold mb-4">Resep Obat</h1>

      <div class="bg-white p-4 rounded shadow">
        
        <!-- DROPDOWN PASIEN -->
        <select id="patient_id" class="border p-2 w-full mb-2"></select>

        <input id="obat" placeholder="Nama Obat" class="border p-2 w-full mb-2">
        <input id="dosis" placeholder="Dosis" class="border p-2 w-full mb-2">

        <button onclick="simpanResep()" class="bg-blue-600 text-white p-2 w-full rounded">
          Simpan Resep
        </button>
      </div>

      <div id="listResep" class="bg-white p-4 rounded shadow mt-4"></div>
    </div>

  </div>
</div>

<script>
const client = window.supabase.createClient(
  "https://bthlwacoyjnyotsjtqrp.supabase.co",
  "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ"
)

// NAVIGATION
function show(menu) {
  document.getElementById('dashboard').classList.add('hidden')
  document.getElementById('patients').classList.add('hidden')
  document.getElementById('resep').classList.add('hidden')

  document.getElementById(menu).classList.remove('hidden')

  if(menu === 'patients') loadPasien()
  if(menu === 'resep') {
    loadPasienDropdown()
    loadResep()
  }
}

// ================= PASIEN =================

async function tambahPasien() {
  const { error } = await client.from('patients').insert([{
    no_rm: no_rm.value,
    nama: nama.value,
    umur: umur.value,
    alamat: alamat.value,
    no_hp: no_hp.value
  }])

  if(error) return alert(error.message)

  alert("Pasien berhasil ditambahkan")
  loadPasien()
}

async function loadPasien() {
  const { data } = await client.from('patients').select('*')

  let html = "<h2 class='font-bold mb-2'>List Pasien</h2>"

  data.forEach(p => {
    html += `
      <div class="border-b py-2">
        <b>${p.no_rm}</b> - ${p.nama} (${p.umur} th)
      </div>
    `
  })

  document.getElementById('listPasien').innerHTML = html
}

// ================= DROPDOWN =================

async function loadPasienDropdown() {
  const { data } = await client.from('patients').select('*')

  let html = "<option value=''>Pilih Pasien</option>"

  data.forEach(p => {
    html += `<option value="${p.id}">${p.no_rm} - ${p.nama}</option>`
  })

  document.getElementById('patient_id').innerHTML = html
}

// ================= RESEP =================

async function simpanResep() {
  const { error } = await client.from('resep').insert([{
    patient_id: patient_id.value,
    obat: obat.value,
    dosis: dosis.value
  }])

  if(error) return alert(error.message)

  alert("Resep berhasil disimpan")
  loadResep()
}

async function loadResep() {
  const { data } = await client
    .from('resep')
    .select(`
      id,
      obat,
      dosis,
      patients(nama, no_rm)
    `)

  let html = "<h2 class='font-bold mb-2'>List Resep</h2>"

  data.forEach(r => {
    html += `
      <div class="border-b py-2">
        <b>${r.patients?.nama || '-'}</b> - ${r.obat} (${r.dosis})
      </div>
    `
  })

  document.getElementById('listResep').innerHTML = html
}

// ================= LOGOUT =================
function logout() {
  window.location.href = "index.html"
}

// INIT
show('dashboard')

</script>

</body>
</html>
