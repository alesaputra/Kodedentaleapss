<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-blue-700 text-white p-5">
    <h2 class="text-xl font-bold mb-6">Dental App</h2>

    <ul>
      <li class="mb-2">Dashboard</li>
      <li class="mb-2">Pasien</li>
      <li onclick="logout()" class="text-red-300 mt-10 cursor-pointer">Logout</li>
    </ul>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 p-6">
    <h1 class="text-2xl font-bold">Dashboard</h1>
    <p>Selamat datang 👋</p>
  </div>

</div>

<script>
const client = window.supabase.createClient(
  "https://bhtlwacoyjnyotsjtqrp.supabase.co",
  "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ"
);

// CEK LOGIN
async function checkUser() {
  const { data } = await client.auth.getUser();

  if (!data.user) {
    alert("Silakan login dulu!");
    window.location.href = "index.html";
  }
}
checkUser();

// LOGOUT
async function logout() {
  await client.auth.signOut();
  window.location.href = "index.html";
}
</script>

</body>
</html>
