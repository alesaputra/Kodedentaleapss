<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dental App</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gradient-to-br from-blue-600 to-teal-500 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-2xl flex w-[800px] overflow-hidden">

  <!-- LEFT SIDE -->
  <div class="w-1/2 bg-blue-600 text-white p-10 flex flex-col justify-center">
    <h1 class="text-3xl font-bold mb-4">Dental Clinic</h1>
    <p class="text-sm opacity-90">
      Sistem manajemen klinik gigi modern untuk membantu pelayanan pasien lebih cepat dan efisien.
    </p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="w-1/2 p-10">

    <h2 id="title" class="text-2xl font-bold mb-6 text-gray-700">Login</h2>

    <div class="space-y-4">
      <input id="username"
        class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
        placeholder="Username">

      <input id="password" type="password"
        class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
        placeholder="Password">

      <button onclick="submit()"
        class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition">
        Login
      </button>
    </div>

    <p onclick="toggle()" id="switch"
      class="text-sm text-center mt-4 text-gray-500 cursor-pointer">
      Belum punya akun? Register
    </p>

    <p id="status" class="text-center text-sm mt-3 text-red-500"></p>

  </div>

</div>

<script>
const client = window.supabase.createClient(
  "https://bhtlwacoyjnyotsjtqrp.supabase.co",
  "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ"
);

let isLogin = true;

function toggle() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Register";
  document.querySelector("button").innerText = isLogin ? "Login" : "Register";
  document.getElementById("switch").innerText = isLogin
    ? "Belum punya akun? Register"
    : "Sudah punya akun? Login";

  document.getElementById("status").innerText = "";
}

async function submit() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;
  const email = user + "@app.com";

  if (!user || !pass) {
    setStatus("Isi semua field!");
    return;
  }

  if (isLogin) {
    const { error } = await client.auth.signInWithPassword({
      email,
      password: pass
    });

    if (error) {
      setStatus(error.message);
    } else {
      setStatus("Login berhasil!", true);
      setTimeout(() => {
        alert("Next: masuk dashboard");
      }, 500);
    }

  } else {
    const { error } = await client.auth.signUp({
      email,
      password: pass
    });

    setStatus(error ? error.message : "Register berhasil!", !error);
  }
}

function setStatus(msg, success = false) {
  const el = document.getElementById("status");
  el.innerText = msg;
  el.className = "text-center text-sm mt-3 " + (success ? "text-green-500" : "text-red-500");
}
</script>

</body>
</html>
