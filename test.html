<!DOCTYPE html>
<html>
<head>
  <title>Dental Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-blue-700 text-white p-5">
    <h2 class="text-xl font-bold mb-6">Dental App</h2>

    <ul class="space-y-3">
      <li onclick="show('dashboard')" class="cursor-pointer hover:underline">Dashboard</li>
      <li onclick="show('patients')" class="cursor-pointer hover:underline">Pasien</li>
      <li onclick="show('schedule')" class="cursor-pointer hover:underline">Jadwal</li>
      <li onclick="logout()" class="cursor-pointer text-red-300 mt-10">Logout</li>
    </ul>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 p-6 overflow-auto">

    <!-- DASHBOARD -->
    <div id="dashboard">
      <h1 class="text-2xl font-bold mb-4">Dashboard</h1>
      <p>Selamat datang di sistem klinik gigi.</p>
    </div>

    <!-- PATIENTS -->
    <div id="patients" class="hidden">
      <h1 class="text-2xl font-bold mb-4">Data Pasien</h1>

      <div class="bg-white p-4 rounded shadow mb-4">
        <input id="pname" placeholder="Nama"
          class="border p-2 rounded mr-2">
        <input id="pphone" placeholder="No HP"
          class="border p-2 rounded mr-2">
        <button onclick="addPatient()"
          class="bg-blue-600 text-white px-4 py-2 rounded">
          Tambah
        </button>
      </div>

      <table class="w-full bg-white rounded shadow">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2 text-left">Nama</th>
            <th class="p-2 text-left">No HP</th>
          </tr>
        </thead>
        <tbody id="patientList"></tbody>
      </table>
    </div>

    <!-- SCHEDULE -->
    <div id="schedule" class="hidden">
      <h1 class="text-2xl font-bold mb-4">Jadwal</h1>

      <div class="bg-white p-4 rounded shadow mb-4">
        <input id="sname" placeholder="Nama Pasien"
          class="border p-2 rounded mr-2">
        <input id="sdate" type="date"
          class="border p-2 rounded mr-2">
        <button onclick="addSchedule()"
          class="bg-green-600 text-white px-4 py-2 rounded">
          Tambah
        </button>
      </div>

      <ul id="scheduleList" class="space-y-2"></ul>
    </div>

  </div>

</div>

<script>
const client = window.supabase.createClient(
  "https://bhtlwacoyjnyotsjtqrp.supabase.co",
  "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ"
);

// ================= NAVIGATION =================
function show(section) {
  ["dashboard","patients","schedule"].forEach(id => {
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(section).classList.remove("hidden");

  if (section === "patients") loadPatients();
}

// ================= AUTH =================
async function checkUser() {
  const { data } = await client.auth.getUser();
  if (!data.user) {
    alert("Silakan login dulu!");
    window.location.href = "index.html";
  }
}
checkUser();

async function logout() {
  await client.auth.signOut();
  window.location.href = "index.html";
}

// ================= PATIENT =================
async function addPatient() {
  const name = document.getElementById("pname").value;
  const phone = document.getElementById("pphone").value;

  if (!name) return alert("Nama wajib!");

  await client.from("patients").insert([{ name, phone }]);

  document.getElementById("pname").value = "";
  document.getElementById("pphone").value = "";

  loadPatients();
}

async function loadPatients() {
  const { data } = await client.from("patients").select("*");

  const list = document.getElementById("patientList");
  list.innerHTML = "";

  data.forEach(p => {
    list.innerHTML += `
      <tr>
        <td class="p-2">${p.name}</td>
        <td class="p-2">${p.phone || "-"}</td>
      </tr>
    `;
  });
}

// ================= SCHEDULE =================
let schedules = [];

function addSchedule() {
  const name = document.getElementById("sname").value;
  const date = document.getElementById("sdate").value;

  if (!name || !date) return alert("Isi semua!");

  schedules.push({ name, date });

  document.getElementById("sname").value = "";
  document.getElementById("sdate").value = "";

  renderSchedule();
}

function renderSchedule() {
  const list = document.getElementById("scheduleList");
  list.innerHTML = "";

  schedules.forEach(s => {
    list.innerHTML += `
      <li class="bg-white p-3 rounded shadow">
        ${s.name} - ${s.date}
      </li>
    `;
  });
}
</script>

</body>
</html>
