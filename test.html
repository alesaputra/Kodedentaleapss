<!DOCTYPE html>
<html>
<head>
  <title>Dental App Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 30px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #4e73df;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #2e59d9;
    }

    .switch {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="card">

  <h2 id="title">Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="submit()">Login</button>

  <div class="switch" onclick="toggle()">
    Belum punya akun? Register
  </div>

  <div id="status"></div>

</div>

<script>
const client = window.supabase.createClient(
  "https://bhtlwacoyjnyotsjtqrp.supabase.co",
  "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ"
);

let isLogin = true;

function toggle() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Register";
  document.querySelector("button").innerText = isLogin ? "Login" : "Register";
  document.querySelector(".switch").innerText = isLogin
    ? "Belum punya akun? Register"
    : "Sudah punya akun? Login";

  document.getElementById("status").innerText = "";
}

async function submit() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;
  const email = user + "@app.com";

  if (!user || !pass) {
    status("Isi semua field!");
    return;
  }

  if (isLogin) {
    const { error } = await client.auth.signInWithPassword({
      email,
      password: pass
    });

    status(error ? error.message : "Login berhasil!");

    if (!error) {
      // contoh redirect
      setTimeout(() => {
        alert("Masuk ke dashboard (next step)");
      }, 500);
    }

  } else {
    const { error } = await client.auth.signUp({
      email,
      password: pass
    });

    status(error ? error.message : "Register berhasil!");
  }
}

function status(msg) {
  document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
