<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const client = createClient(
  "https://bhtlwacoyjnyotsjtqrp.supabase.co",
  "sb_publishable_nVflF_SkxsLXkWQAxg4jTg_Kw5b97GJ"
)

window.client = client

window.register = async function(){
  const email = document.getElementById("ruser").value + "@app.com"
  const pass = document.getElementById("rpass").value

  const { error } = await client.auth.signUp({ email, password: pass })
  document.getElementById("status").innerText = error ? error.message : "REGISTER OK"
}

window.login = async function(){
  const email = document.getElementById("luser").value + "@app.com"
  const pass = document.getElementById("lpass").value

  const { error } = await client.auth.signInWithPassword({ email, password: pass })
  document.getElementById("status").innerText = error ? error.message : "LOGIN OK"
}
</script>
